# Civic Intelligence Platform — local stack
#
# Topology (per docs/03 §24, docs/14 §27, docs/16 §3):
#   nginx  →  php (Laravel 12)
#   php    →  mysql (8.4 LTS)
#   php    →  redis (cache + queue)
#   php    →  minio (S3-compatible evidence storage)
#   queue  →  redis
#   scheduler → mysql
#
# All credentials and bucket names are env-driven; the .env file at the
# repo root is the source of truth for development values. Production
# overrides should be supplied through a secrets manager, never committed.

name: cip

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  mysql:
    image: mysql:8.4
    container_name: cip-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
      - --innodb_flush_log_at_trx_commit=2
      - --max_connections=200
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-cip}
      MYSQL_USER: ${DB_USERNAME:-cip}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cip}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cipnet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7.4-alpine
    container_name: cip-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    networks:
      - cipnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: cip-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-cipminio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-cipminio-secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - cipnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: cip-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - cipnet
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb -p local/$$AWS_BUCKET || true
        mc anonymous set none local/$$AWS_BUCKET
        mc version enable local/$$AWS_BUCKET
        echo "MinIO bucket $$AWS_BUCKET ready"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-cipminio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-cipminio-secret}
      AWS_BUCKET: ${AWS_BUCKET:-cip-evidence}
    restart: "no"
    logging: *default-logging

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cip-php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-cip}
      DB_USERNAME: ${DB_USERNAME:-cip}
      DB_PASSWORD: ${DB_PASSWORD:-cip}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-cipminio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-cipminio-secret}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-cip-evidence}
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: http://localhost:9000/${AWS_BUCKET:-cip-evidence}
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    networks:
      - cipnet
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(0);"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cip-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--backoff=10", "--max-time=3600"]
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-cip}
      DB_USERNAME: ${DB_USERNAME:-cip}
      DB_PASSWORD: ${DB_PASSWORD:-cip}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
    networks:
      - cipnet
    depends_on:
      php:
        condition: service_started
    logging: *default-logging

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cip-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "while true; do
        php artisan schedule:run --no-interaction;
        sleep 60;
      done"
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-cip}
      DB_USERNAME: ${DB_USERNAME:-cip}
      DB_PASSWORD: ${DB_PASSWORD:-cip}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - cipnet
    depends_on:
      php:
        condition: service_started
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    container_name: cip-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/html/public:ro
      - backend_storage:/var/www/html/storage:ro
    networks:
      - cipnet
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging

volumes:
  mysql_data:
  redis_data:
  minio_data:
  backend_storage:
  backend_cache:

networks:
  cipnet:
    driver: bridge
