; Applied by the deploy to the API docroot (~/cip/public/).
; The server's global php.ini disables opcache.validate_timestamps,
; which means rsync'd backend code (bootstrap/app.php, policies, etc.)
; stays cached as stale bytecode until PHP-FPM is restarted. cPanel honors
; PHP_INI_PERDIR settings from a per-directory .user.ini, so we re-enable
; timestamp validation here. This makes every deploy go live without an
; FPM restart. user_ini.cache_ttl (default 300s) governs how quickly PHP
; picks up THIS file itself; once read, opcache revalidates per request.
opcache.validate_timestamps=1
opcache.revalidate_freq=0
opcache.revalidate_path=1
