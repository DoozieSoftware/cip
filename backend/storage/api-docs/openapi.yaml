openapi: 3.0.0
info:
  title: 'Civic Intelligence Platform API'
  description: |
    REST API for the Civic Intelligence Platform.
    - M2 adds the Authentication namespace (citizen OTP login, JWT issuance, refresh rotation).
    - M3 adds the Super Admin master-data CRUD namespaces (departments, settings, feature flags) and the geography tree that every portal reads on cold start.
  contact:
    name: 'Civic Platform Engineering'
    email: eng@cip.local
  license:
    name: Proprietary
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8080'
    description: 'Local docker-compose stack'
  -
    url: '{scheme}://{host}'
    description: 'Configurable host'
    variables:
      scheme:
        enum:
          - http
          - https
        default: https
      host:
        default: api.cip.local
paths:
  /api/v1/health:
    get:
      tags:
        - Health
      summary: 'Liveness probe'
      operationId: health.live
      responses:
        '200':
          description: 'Service is alive'
          content:
            application/json:
              schema:
                required:
                  - success
                  - message
                  - data
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Service is alive' }
                  data: { required: [status, service, time], properties: { status: { type: string, example: ok }, service: { type: string, example: 'Civic Intelligence Platform' }, time: { type: string, format: date-time } }, type: object }
                  meta: { type: object }
                type: object
  /api/v1/health/ready:
    get:
      tags:
        - Health
      summary: 'Readiness probe with per-component checks'
      operationId: health.ready
      responses:
        '200':
          description: 'All components ready'
          content:
            application/json:
              schema:
                required:
                  - success
                  - message
                  - data
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'All components ready' }
                  data: { required: [status, checks], properties: { status: { type: string, enum: [ready, degraded] }, checks: { type: object, additionalProperties: { required: [ok, message], properties: { ok: { type: boolean }, message: { type: string } }, type: object } } }, type: object }
                type: object
        '503':
          description: 'One or more components unhealthy'
          content:
            application/json:
              schema:
                required:
                  - success
                  - message
                  - data
                properties:
                  success: { type: boolean, example: false }
                  message: { type: string, example: 'One or more components unhealthy' }
                type: object
  /api/v1/auth/send-otp:
    post:
      tags:
        - Authentication
      summary: 'Request an OTP for citizen login'
      description: |
        Issues a 6-digit OTP to the supplied mobile number via the configured
        SMS gateway. Per docs/11 §6 the platform stores only the bcrypt hash
        of the code and applies a 5/hour per-(mobile+IP) budget. The plain
        code is never returned by this endpoint.
      operationId: auth.sendOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendOtpRequest'
      responses:
        '200':
          description: 'OTP dispatched (or queued). The client should now collect the code from the citizen.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendOtpResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/auth/verify-otp:
    post:
      tags:
        - Authentication
      summary: 'Verify OTP and issue access + refresh tokens'
      description: |
        Verifies the 6-digit code against the latest unused OTP for the
        mobile. On success issues a Sanctum personal access token and an
        opaque refresh token. The refresh token is shown only once; the
        caller MUST store it before making the next call.
      operationId: auth.verifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: 'Authentication successful; tokens returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyOtpResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/auth/refresh:
    post:
      tags:
        - Authentication
      summary: 'Rotate the refresh token and issue a new access token'
      description: |
        Consumes a one-time refresh token and returns a new access token
        plus a new refresh token. The presented refresh token is marked
        used and cannot be presented again. Replay attempts emit a
        security event (REFRESH_TOKEN_REPLAY) and revoke the entire
        session chain.
      operationId: auth.refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: 'Tokens rotated successfully.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/auth/logout:
    post:
      tags:
        - Authentication
      summary: 'Revoke the current access and refresh tokens'
      description: |
        Revokes the bearer access token and all refresh tokens for the
        current session. Idempotent — a second call returns 401 because
        the bearer token is no longer valid.
      operationId: auth.logout
      security:
        - sanctum: []
      responses:
        '200':
          description: 'Logged out successfully.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/me:
    get:
      tags:
        - Authentication
      summary: 'Return the current user'
      description: |
        Returns the authenticated user (mobile, roles, permissions).
        Roles and permissions are included only when the caller
        explicitly requested them via a pre-loaded relation; in the
        default /me response both arrays are present.
      operationId: auth.me
      security:
        - sanctum: []
      responses:
        '200':
          description: 'Current user returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/admin/routing-rules:
    get:
      tags: [Routing]
      summary: 'List routing rules (paginated)'
      operationId: admin.routing-rules.index
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: active
          schema: { type: boolean }
        - in: query
          name: per_page
          schema: { type: integer, default: 25, maximum: 200 }
      responses:
        '200':
          description: 'Paginated list of routing rules.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoutingRuleListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
    post:
      tags: [Routing]
      summary: 'Create a routing rule'
      operationId: admin.routing-rules.store
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoutingRuleStoreRequest' }
      responses:
        '201':
          description: 'Routing rule created.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoutingRuleResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/admin/routing-rules/reorder:
    post:
      tags: [Routing]
      summary: 'Reorder routing rules by sending the desired final order'
      operationId: admin.routing-rules.reorder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoutingRuleReorderRequest' }
      responses:
        '200':
          description: 'Routing rules reordered.'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          reordered: { type: boolean, example: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/admin/routing-rules/{rule}:
    parameters:
      - in: path
        name: rule
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Routing]
      summary: 'Show a routing rule'
      operationId: admin.routing-rules.show
      responses:
        '200':
          description: 'Routing rule found.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoutingRuleResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Routing]
      summary: 'Update a routing rule'
      operationId: admin.routing-rules.update
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoutingRuleUpdateRequest' }
      responses:
        '200':
          description: 'Routing rule updated.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoutingRuleResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Routing]
      summary: 'Soft-delete a routing rule'
      operationId: admin.routing-rules.destroy
      responses:
        '200':
          description: 'Routing rule soft-deleted.'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deleted: { type: boolean, example: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/admin/reports/{report}/reassign:
    parameters:
      - in: path
        name: report
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Routing]
      summary: 'Manually reassign a report to a new department / officer'
      operationId: admin.reports.reassign
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReassignReportRequest' }
      responses:
        '200':
          description: 'Report reassigned.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReassignResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

components:
  securitySchemes:
    sanctum:
      type: http
      description: 'Laravel Sanctum personal access token (M2).'
      bearerFormat: 'Sanctum PAT'
      scheme: bearer
  schemas:
    ApiResponse:
      type: object
      description: 'Standard API envelope (docs/03 §20).'
      required: [success, message, data, code, trace_id]
      properties:
        success: { type: boolean }
        message: { type: string }
        data: { type: object, additionalProperties: true, nullable: true }
        errors: { type: object, additionalProperties: true, nullable: true }
        code: { type: string, description: 'Application-specific error code; null on success.' }
        trace_id: { type: string, description: 'Request id used for cross-service correlation.' }
        meta: { type: object, additionalProperties: true, nullable: true }
    ErrorResponse:
      type: object
      required: [success, message, code, trace_id]
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: 'Invalid OTP code.' }
        code: { type: string, example: 'OTP_INVALID' }
        trace_id: { type: string, example: '0HMM8M3N5G2F1:00000001' }
        errors: { type: object, additionalProperties: true, nullable: true }
    SendOtpRequest:
      type: object
      required: [mobile]
      properties:
        mobile: { type: string, description: '10-digit local or E.164 form.', example: '9876543210' }
    SendOtpResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                otp_sent: { type: boolean, example: true }
    VerifyOtpRequest:
      type: object
      required: [mobile, code]
      properties:
        mobile: { type: string, example: '9876543210' }
        code: { type: string, description: '6-digit OTP delivered to the citizen.', example: '482913' }
    VerifyOtpResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required: [token, refresh_token, refresh_expires_at, user]
              properties:
                token:
                  type: object
                  required: [access_token, type, expires_at]
                  properties:
                    access_token: { type: string, description: 'Sanctum PAT. Use as `Authorization: Bearer <access_token>`.' }
                    type: { type: string, example: 'Bearer' }
                    expires_at: { type: string, format: date-time, nullable: true }
                refresh_token:
                  type: string
                  description: 'Opaque plaintext refresh token. Shown only once — store immediately.'
                refresh_expires_at: { type: string, format: date-time }
                user: { $ref: '#/components/schemas/User' }
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string, minLength: 32, description: 'Opaque refresh token returned by /verify-otp or a previous /refresh.' }
    RefreshTokenResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required: [token, refresh_token, refresh_expires_at]
              properties:
                token:
                  type: object
                  required: [access_token, type, expires_at]
                  properties:
                    access_token: { type: string }
                    type: { type: string, example: 'Bearer' }
                    expires_at: { type: string, format: date-time, nullable: true }
                refresh_token: { type: string }
                refresh_expires_at: { type: string, format: date-time }
    LogoutResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                logged_out: { type: boolean, example: true }
    User:
      type: object
      description: 'UserResource payload (docs/05 §3). Roles and permissions are populated when the relation was eager-loaded.'
      properties:
        id: { type: string, format: uuid }
        name: { type: string, nullable: true }
        mobile: { type: string, example: '9876543210' }
        email: { type: string, format: email, nullable: true }
        anonymous_enabled: { type: boolean }
        status: { type: string, enum: [active, suspended, disabled, pending] }
        otp_verified_at: { type: string, format: date-time, nullable: true }
        last_login_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }
        roles:
          type: array
          items: { type: string, example: 'citizen' }
        permissions:
          type: array
          items: { type: string, example: 'reports.submit' }
    UserResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/User' }
    DepartmentStoreRequest:
      type: object
      required: [name, code]
      properties:
        name: { type: string, maxLength: 255 }
        code: { type: string, maxLength: 32, description: 'Short uppercase code (e.g. BBMP).' }
        parent_id: { type: string, format: uuid, nullable: true }
        jurisdiction: { type: string, nullable: true, maxLength: 255 }
        address: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true, maxLength: 255 }
        phone: { type: string, nullable: true, maxLength: 32 }
        working_hours: { type: object, additionalProperties: true, nullable: true, description: 'Per-weekday open/close time. Example: {"mon": ["09:00","17:30"]}.' }
        holiday_calendar: { type: array, items: { type: string, format: date }, nullable: true }
        default_workflow_id: { type: string, format: uuid, nullable: true }
        default_sla_minutes: { type: integer, minimum: 1, maximum: 525600, nullable: true }
        escalation_matrix:
          type: array
          nullable: true
          items:
            type: object
            required: [after_minutes]
            properties:
              after_minutes: { type: integer, minimum: 1 }
              escalate_to: { type: string }
        active: { type: boolean, nullable: true }
    DepartmentUpdateRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        code: { type: string, maxLength: 32 }
        parent_id: { type: string, format: uuid, nullable: true }
        jurisdiction: { type: string, nullable: true, maxLength: 255 }
        address: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true, maxLength: 255 }
        phone: { type: string, nullable: true, maxLength: 32 }
        working_hours: { type: object, additionalProperties: true, nullable: true }
        holiday_calendar: { type: array, items: { type: string, format: date }, nullable: true }
        default_workflow_id: { type: string, format: uuid, nullable: true }
        default_sla_minutes: { type: integer, minimum: 1, maximum: 525600, nullable: true }
        escalation_matrix:
          type: array
          nullable: true
          items:
            type: object
            properties:
              after_minutes: { type: integer, minimum: 1 }
              escalate_to: { type: string }
        active: { type: boolean }
    Department:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        code: { type: string }
        parent_id: { type: string, format: uuid, nullable: true }
        jurisdiction: { type: string, nullable: true }
        address: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }
        working_hours: { type: object, additionalProperties: true, nullable: true }
        holiday_calendar: { type: array, items: { type: string, format: date }, nullable: true }
        default_workflow_id: { type: string, format: uuid, nullable: true }
        default_sla_minutes: { type: integer, nullable: true }
        escalation_matrix: { type: array, items: { type: object }, nullable: true }
        active: { type: boolean }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true }
    DepartmentResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Department' }
    DepartmentListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Department' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    SettingStoreRequest:
      type: object
      required: [key, value, type]
      properties:
        key: { type: string, maxLength: 255, description: 'Dotted-path identifier (e.g. ai.vision.provider).' }
        value: { description: 'JSON-decodable value. Strings, numbers, booleans, and arrays are accepted.' }
        type: { type: string, enum: [string, int, integer, bool, boolean, json, datetime] }
        description: { type: string, nullable: true, maxLength: 1000 }
        is_public: { type: boolean, nullable: true, description: 'When true, the setting is returned by /api/v1/master-config without authentication.' }
    SettingUpdateRequest:
      type: object
      properties:
        value: {}
        type: { type: string, enum: [string, int, integer, bool, boolean, json, datetime] }
        description: { type: string, nullable: true, maxLength: 1000 }
        is_public: { type: boolean }
    Setting:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        value: {}
        type: { type: string }
        description: { type: string, nullable: true }
        is_public: { type: boolean }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true }
    SettingResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Setting' }
    SettingListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Setting' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    AppConfigStoreRequest:
      type: object
      required: [key]
      properties:
        key: { type: string, maxLength: 255 }
        value: { nullable: true, description: 'Optional JSON payload returned when the flag is on.' }
        enabled: { type: boolean, nullable: true, default: false }
        rollout_percentage: { type: integer, minimum: 0, maximum: 100, nullable: true, default: 0 }
        cohort:
          type: array
          nullable: true
          description: 'Predicate list. ANY match short-circuits the flag to true.'
          items:
            type: object
            additionalProperties: true
        description: { type: string, nullable: true, maxLength: 1000 }
    AppConfigUpdateRequest:
      type: object
      properties:
        value: { nullable: true }
        enabled: { type: boolean }
        rollout_percentage: { type: integer, minimum: 0, maximum: 100 }
        cohort:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
        description: { type: string, nullable: true, maxLength: 1000 }
    AppConfig:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        value: { nullable: true }
        enabled: { type: boolean }
        rollout_percentage: { type: integer }
        cohort:
          type: array
          nullable: true
          items: { type: object, additionalProperties: true }
        description: { type: string, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
    AppConfigResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/AppConfig' }
    AppConfigListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/AppConfig' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    AppConfigEvaluateResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required: [key, enabled]
              properties:
                key: { type: string }
                enabled: { type: boolean }
                user_id: { type: string, format: uuid, nullable: true }
                session_id: { type: string, nullable: true }
    PaginationMeta:
      type: object
      properties:
        total: { type: integer }
        per_page: { type: integer }
        current_page: { type: integer }
        last_page: { type: integer }
  responses:
    NotFound:
      description: 'Resource not found.'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: 'Authenticated but the role is not permitted.'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ValidationError:
      description: 'Request body failed validation.'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: 'Authentication required or invalid.'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    RateLimited:
