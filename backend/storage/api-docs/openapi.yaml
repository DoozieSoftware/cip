  /api/v1/reports/{id}/photos:
    post:
      tags: [Media]
      summary: 'Upload photo evidence for a report'
      operationId: reports.photos.store
      description: |
        Accepts a multipart upload of one or more photo files (jpeg/png).
        Per docs/05 §14 the per-type cap is 10 photos and 16 MB per file.
        The bytes are scanned, persisted under `evidence/{report}/photo/{uuid}.{ext}`,
        and three post-processing jobs (ComputeHashes, GenerateThumbnail, and the
        chain-of-custody VIEW row on read) are dispatched on the `media` queue.
      security:
        - sanctum: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photos]
              properties:
                photos:
                  type: array
                  items: { type: string, format: binary, description: 'A photo (image/jpeg or image/png).' }
                  minItems: 1
                  maxItems: 10
      responses:
        '201':
          description: 'Photos uploaded'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          media:
                            type: array
                            items: { $ref: '#/components/schemas/Media' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: 'Validation / mime / size error'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /api/v1/reports/{id}/video:
    post:
      tags: [Media]
      summary: 'Upload a single video evidence file for a report'
      operationId: reports.video.store
      description: |
        Accepts a multipart upload of one mp4/quicktime video. The per-report
        cap is 1 video (409 on conflict) and 100 MB / 3-300 s.
        ExtractVideoMetadataJob is dispatched on the `media` queue.
      security:
        - sanctum: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [video]
              properties:
                video: { type: string, format: binary, description: 'The video file (video/mp4 or video/quicktime).' }
                duration_seconds: { type: integer, minimum: 3, maximum: 300, description: 'Citizen-client-measured duration used as fallback when ffprobe is missing.' }
                width: { type: integer, description: 'Optional upload-time width hint (for ffprobe-missing fallback).' }
                height: { type: integer, description: 'Optional upload-time height hint.' }
      responses:
        '201':
          description: 'Video uploaded'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          media: { $ref: '#/components/schemas/Media' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: 'A video is already attached to this report'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: 'Validation / mime / size / duration error'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /api/v1/reports/{id}/media:
    get:
      tags: [Media]
      summary: 'List media attached to a report'
      operationId: reports.media.index
      description: |
        Returns the media array for a report. Each entry carries a 15-minute
        temporary signed URL (`signed_url`) for playback. Non-staff callers
        see only the public fields; the storage path is hidden unless
        `include_storage_path=1` is passed by a super_admin.
        Reading this endpoint writes a `VIEW` row to the chain-of-custody
        log (docs/11 §15) for every media the caller can see.
      security:
        - sanctum: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: include_storage_path, in: query, required: false, schema: { type: integer, enum: [0, 1] } }
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          media:
                            type: array
                            items: { $ref: '#/components/schemas/MediaWithSignedUrl' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/reports/{id}/media/{media}/audit:
    get:
      tags: [Media]
      summary: 'Staff-only chain-of-custody audit trail for one media row'
      operationId: reports.media.audit
      description: |
        Returns the append-only access log (VIEW / DOWNLOAD / REPLACE / DELETE
        / VIRUS_SCAN) for a single media row. Restricted to
        moderator / department / super_admin / system per docs/11 §15.
      security:
        - sanctum: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: media, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          media_id: { type: string, format: uuid }
                          audit:
                            type: array
                            items: { $ref: '#/components/schemas/MediaAccessLog' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/media/{media}/serve:
    get:
      tags: [Media]
      summary: 'Stream a media file via its signed URL'
      operationId: media.serve
      description: |
        Public route — the signed URL is the auth. Writes a `DOWNLOAD`
        row to the chain-of-custody log on every successful read.
        The signed URL expires (default 15 min) and a 403 is returned
        for expired or tampered signatures.
      parameters:
        - { name: media, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: expires, in: query, required: true, schema: { type: integer, description: 'Unix timestamp; must be in the future.' } }
        - { name: signature, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: 'Binary file (mime matches the Media row)'
          content:
            '*/*':
              schema: { type: string, format: binary }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410':
          description: 'Media bytes missing on storage'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
