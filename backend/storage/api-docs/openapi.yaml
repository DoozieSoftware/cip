openapi: 3.0.0
info:
  title: 'Civic Intelligence Platform API'
  description: |
    REST API for the Civic Intelligence Platform.
    - M2 adds the Authentication namespace (citizen OTP login, JWT issuance, refresh rotation).
    - M3 adds the Super Admin master-data CRUD namespaces (departments, settings, feature flags) and the geography tree that every portal reads on cold start.
  contact:
    name: 'Civic Platform Engineering'
    email: eng@cip.local
  license:
    name: Proprietary
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8080'
    description: 'Local docker-compose stack'
  -
    url: '{scheme}://{host}'
    description: 'Configurable host'
    variables:
      scheme:
        enum:
          - http
          - https
        default: https
      host:
        default: api.cip.local
paths:
  /api/v1/health:
    get:
      summary: 'Liveness probe'
      tags: [Health]
      operationId: health.live
      responses:
        '200':
          description: 'Service alive'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthLiveResponse' }
  /api/v1/public/stats:
    get:
      summary: 'Public, unauthenticated platform statistics for the landing page'
      description: |
        Aggregate, privacy-safe counts only — no citizen identity, no
        exact coordinates, no evidence. Server-side cached for 5
        minutes. Rate-limited to 30 requests/minute/IP.
      tags: [Public]
      operationId: public.stats.index
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicStatsResponse' }
        '429':
          $ref: '#/components/responses/RateLimited'
  # =============================================================
  # M11 — Operations portal (Department) paths
  # =============================================================
  /api/v1/department/dashboard:
    get:
      tags: [Operations]
      summary: 'Department-officer dashboard (M11)'
      operationId: department.dashboard.show
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentDashboardResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/department/reports:
    get:
      tags: [Operations]
      summary: 'Paginated list of reports assigned to the officer''s department (M11)'
      operationId: department.reports.index
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: priority
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: ward_id
          schema: { type: string, format: uuid }
        - in: query
          name: date_from
          schema: { type: string, format: date-time }
        - in: query
          name: date_to
          schema: { type: string, format: date-time }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 500, default: 20 }
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentReportListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/department/reports/export:
    get:
      tags: [Operations]
      summary: 'Export reports assigned to the officer''s department as CSV/XLSX/PDF (M11)'
      operationId: department.reports.export
      parameters:
        - in: query
          name: format
          required: true
          schema: { type: string, enum: [csv, xlsx, pdf] }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: priority
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: ward_id
          schema: { type: string, format: uuid }
        - in: query
          name: date_from
          schema: { type: string, format: date-time }
        - in: query
          name: date_to
          schema: { type: string, format: date-time }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          description: 'Downloadable file (text/csv, application/vnd.ms-excel, or application/pdf)'
          content:
            text/csv: { schema: { type: string } }
            application/vnd.ms-excel: { schema: { type: string } }
            application/pdf: { schema: { type: string, format: binary } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/department/reports/{report}:
    get:
      tags: [Operations]
      summary: 'Show one report assigned to the officer''s department (M11)'
      operationId: department.reports.show
      parameters:
        - $ref: '#/components/parameters/PathReportId'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentReportDetailResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/department/reports/{report}/accept:
    post:
      tags: [Operations]
      summary: 'Department officer accepts a report (assigned -> accepted) (M11)'
      operationId: department.reports.accept
      parameters:
        - $ref: '#/components/parameters/PathReportId'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentReportDetailResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/department/reports/{report}/start:
    post:
      tags: [Operations]
      summary: 'Department officer starts work on a report (accepted -> in_progress) (M11)'
      operationId: department.reports.start
      parameters:
        - $ref: '#/components/parameters/PathReportId'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentReportDetailResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/department/reports/{report}/progress:
    post:
      tags: [Operations]
      summary: 'Department officer records a progress comment (no state change) (M11)'
      operationId: department.reports.progress
      parameters:
        - $ref: '#/components/parameters/PathReportId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProgressNoteRequest' }
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentReportDetailResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/department/reports/{report}/resolve:
    post:
      tags: [Operations]
      summary: 'Department officer resolves a report (in_progress -> resolved) (M11)'
      operationId: department.reports.resolve
      parameters:
        - $ref: '#/components/parameters/PathReportId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProgressNoteRequest' }
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentReportDetailResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/department/reports/{report}/close:
    post:
      tags: [Operations]
      summary: 'Department officer closes a report (resolved -> closed) (M11)'
      operationId: department.reports.close
      parameters:
        - $ref: '#/components/parameters/PathReportId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProgressNoteRequest' }
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentReportDetailResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/department/reports/{report}/note:
    post:
      tags: [Operations]
      summary: 'Department officer adds an internal note (department-private) (M11)'
      operationId: department.reports.note.store
      parameters:
        - $ref: '#/components/parameters/PathReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InternalNoteRequest' }
      responses:
        '201':
          description: 'Note created'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalNoteResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/department/reports/{report}/notes:
    get:
      tags: [Operations]
      summary: 'List the internal notes on a report, newest-first (M11)'
      operationId: department.reports.notes.index
      parameters:
        - $ref: '#/components/parameters/PathReportId'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalNoteListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/admin/departments/{department}/officers:
    get:
      tags: ['Department Admin']
      summary: 'List officers attached to a department (M11)'
      operationId: admin.departments.officers.index
      parameters:
        - $ref: '#/components/parameters/PathDepartmentId'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentOfficerListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: ['Department Admin']
      summary: 'Attach an officer to a department (M11)'
      operationId: admin.departments.officers.store
      parameters:
        - $ref: '#/components/parameters/PathDepartmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AttachOfficerRequest' }
      responses:
        '201':
          description: 'Officer attached'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttachOfficerResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/admin/departments/{department}/officers/{user}:
    delete:
      tags: ['Department Admin']
      summary: 'Detach an officer from a department (M11)'
      operationId: admin.departments.officers.destroy
      parameters:
        - $ref: '#/components/parameters/PathDepartmentId'
        - in: path
          name: user
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DetachOfficerResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/admin/departments/{department}/admin:
    patch:
      tags: ['Department Admin']
      summary: 'Update SLA / working hours / holiday calendar / escalation matrix (M11)'
      operationId: admin.departments.admin.update
      parameters:
        - $ref: '#/components/parameters/PathDepartmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDepartmentAdminRequest' }
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdateDepartmentAdminResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  # =============================================================
  # M11 — Operations schemas
  # =============================================================
  DepartmentDashboardCounts:
    type: object
    properties:
      open: { type: integer }
      due_today: { type: integer }
      sla_breached: { type: integer }
      by_category:
        type: object
        additionalProperties: { type: integer }
  DepartmentDashboardResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data: { $ref: '#/components/schemas/DepartmentDashboardCounts' }
  DepartmentReportListItem:
    allOf:
      - $ref: '#/components/schemas/ReportListItem'
      - type: object
        properties:
          current_status_code: { type: string, example: 'assigned' }
          department_sla_minutes: { type: integer, nullable: true }
          internal_notes:
            type: array
            items: { $ref: '#/components/schemas/InternalNote' }
  DepartmentReportDetail:
    allOf:
      - $ref: '#/components/schemas/DepartmentReportListItem'
  DepartmentReportListResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: array
            items: { $ref: '#/components/schemas/DepartmentReportListItem' }
          meta:
            type: object
            properties:
              current_page: { type: integer }
              per_page: { type: integer }
              total: { type: integer }
              last_page: { type: integer }
  DepartmentReportDetailResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data: { $ref: '#/components/schemas/DepartmentReportDetail' }
  ProgressNoteRequest:
    type: object
    properties:
      note: { type: string, maxLength: 4000 }
  InternalNote:
    type: object
    properties:
      id: { type: string, format: uuid }
      body: { type: string }
      author_id: { type: string, format: uuid, nullable: true }
      author_name: { type: string, nullable: true }
      created_at: { type: string, format: date-time }
  InternalNoteRequest:
    type: object
    required: [body]
    properties:
      body: { type: string, minLength: 1, maxLength: 4000 }
  InternalNoteResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data: { $ref: '#/components/schemas/InternalNote' }
  InternalNoteListResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: array
            items: { $ref: '#/components/schemas/InternalNote' }
  DepartmentOfficer:
    type: object
    properties:
      id: { type: string, format: uuid }
      name: { type: string, nullable: true }
      mobile: { type: string }
      email: { type: string, nullable: true }
      is_manager: { type: boolean }
      assigned_at: { type: string, format: date-time, nullable: true }
  DepartmentOfficerListResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: array
            items: { $ref: '#/components/schemas/DepartmentOfficer' }
          meta:
            type: object
            properties:
              total: { type: integer }
              per_page: { type: integer }
              current_page: { type: integer }
              last_page: { type: integer }
  AttachOfficerRequest:
    type: object
    required: [user_id]
    properties:
      user_id: { type: string, format: uuid }
      is_manager: { type: boolean, default: false }
      assigned_at: { type: string, format: date-time, nullable: true }
  AttachOfficerResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: object
            properties:
              pivot_id: { type: string, format: uuid }
              department_id: { type: string, format: uuid }
  DetachOfficerResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: object
            properties:
              removed: { type: boolean }
  UpdateDepartmentAdminRequest:
    type: object
    properties:
      default_sla_minutes: { type: integer, minimum: 1, maximum: 525600 }
      working_hours:
        type: array
        items:
          type: object
          required: [day, open, close]
          properties:
            day: { type: string, enum: [mon, tue, wed, thu, fri, sat, sun] }
            open: { type: string, example: '09:00' }
            close: { type: string, example: '17:00' }
      holiday_calendar:
        type: array
        items: { type: string, format: date, example: '2026-12-25' }
      escalation_matrix:
        type: array
        items:
          type: object
          required: [after_minutes]
          properties:
            after_minutes: { type: integer, minimum: 1 }
            escalate_to: { type: string, format: uuid, nullable: true }
  UpdateDepartmentAdminResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: object
            properties:
              id: { type: string, format: uuid }
              default_sla_minutes: { type: integer }
              working_hours:
                type: array
                items:
                  type: object
                  properties:
                    day: { type: string }
                    open: { type: string }
                    close: { type: string }
              holiday_calendar:
                type: array
                items: { type: string, format: date }
              escalation_matrix:
                type: array
                items:
                  type: object
                  properties:
                    after_minutes: { type: integer }
                    escalate_to: { type: string, format: uuid, nullable: true }

  /api/v1/health/ready:
    get:
      tags:
        - Health
      summary: 'Readiness probe with per-component checks'
      operationId: health.ready
      responses:
        '200':
          description: 'All components ready'
          content:
            application/json:
              schema:
                required:
                  - success
                  - message
                  - data
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'All components ready' }
                  data: { required: [status, checks], properties: { status: { type: string, enum: [ready, degraded] }, checks: { type: object, additionalProperties: { required: [ok, message], properties: { ok: { type: boolean }, message: { type: string } }, type: object } } }, type: object }
                type: object
        '503':
          description: 'One or more components unhealthy'
          content:
            application/json:
              schema:
                required:
                  - success
                  - message
                  - data
                properties:
                  success: { type: boolean, example: false }
                  message: { type: string, example: 'One or more components unhealthy' }
                type: object
  /api/v1/auth/send-otp:
    post:
      tags:
        - Authentication
      summary: 'Request an OTP for citizen login'
      description: |
        Issues a 6-digit OTP to the supplied mobile number via the configured
        SMS gateway. Per docs/11 §6 the platform stores only the bcrypt hash
        of the code and applies a 5/hour per-(mobile+IP) budget. The plain
        code is never returned by this endpoint.
      operationId: auth.sendOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendOtpRequest'
      responses:
        '200':
          description: 'OTP dispatched (or queued). The client should now collect the code from the citizen.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendOtpResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/auth/verify-otp:
    post:
      tags:
        - Authentication
      summary: 'Verify OTP and issue access + refresh tokens'
      description: |
        Verifies the 6-digit code against the latest unused OTP for the
        mobile. On success issues a Sanctum personal access token and an
        opaque refresh token. The refresh token is shown only once; the
        caller MUST store it before making the next call.
      operationId: auth.verifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: 'Authentication successful; tokens returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyOtpResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: 'Staff password login'
      description: |
        Password-based login for staff accounts (moderator, department
        officer/admin, super_admin, auditor) — docs/11 §8. Citizens are
        OTP-only and have no password set, so this endpoint always
        returns 401 for a citizen mobile. Locks out after 5 failed
        attempts for the same mobile within a rolling 15-minute window
        (429). Emits LOGIN_SUCCESS / LOGIN_FAILURE security events.
      operationId: auth.login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 'Authentication successful; tokens returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyOtpResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/auth/refresh:
    post:
      tags:
        - Authentication
      summary: 'Rotate the refresh token and issue a new access token'
      description: |
        Consumes a one-time refresh token and returns a new access token
        plus a new refresh token. The presented refresh token is marked
        used and cannot be presented again. Replay attempts emit a
        security event (REFRESH_TOKEN_REPLAY) and revoke the entire
        session chain.
      operationId: auth.refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: 'Tokens rotated successfully.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/auth/logout:
    post:
      tags:
        - Authentication
      summary: 'Revoke the current access and refresh tokens'
      description: |
        Revokes the bearer access token and all refresh tokens for the
        current session. Idempotent — a second call returns 401 because
        the bearer token is no longer valid.
      operationId: auth.logout
      security:
        - sanctum: []
      responses:
        '200':
          description: 'Logged out successfully.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/me:
    get:
      tags:
        - Authentication
      summary: 'Return the current user'
      description: |
        Returns the authenticated user (mobile, roles, permissions).
        Roles and permissions are included only when the caller
        explicitly requested them via a pre-loaded relation; in the
        default /me response both arrays are present.
      operationId: auth.me
      security:
        - sanctum: []
      responses:
        '200':
          description: 'Current user returned.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/admin/routing-rules:
    get:
      tags: [Routing]
      summary: 'List routing rules (paginated)'
      operationId: admin.routing-rules.index
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: active
          schema: { type: boolean }
        - in: query
          name: per_page
          schema: { type: integer, default: 25, maximum: 200 }
      responses:
