  /api/v1/admin/workflows:
    get:
      tags: [Workflows]
      summary: 'List workflow definitions (paginated)'
      operationId: admin.workflows.index
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: active
          schema: { type: boolean }
        - in: query
          name: per_page
          schema: { type: integer, default: 25, maximum: 200 }
      responses:
        '200':
          description: 'Paginated list of workflow definitions.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
    post:
      tags: [Workflows]
      summary: 'Create a workflow definition (with optional states + transitions)'
      operationId: admin.workflows.store
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkflowStoreRequest' }
      responses:
        '201':
          description: 'Workflow created.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: 'A workflow with this code already exists.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/admin/workflows/{workflow}:
    parameters:
      - in: path
        name: workflow
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Workflows]
      summary: 'Show a workflow definition with its full graph (states + transitions)'
      operationId: admin.workflows.show
      responses:
        '200':
          description: 'Workflow found.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Workflows]
      summary: 'Update a workflow definition (name / active / states / transitions)'
      operationId: admin.workflows.update
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkflowUpdateRequest' }
      responses:
        '200':
          description: 'Workflow updated. Read-side cache is invalidated.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: 'The new code is already in use by another workflow.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Workflows]
      summary: 'Soft-delete a workflow definition'
      description: |
        The default civic workflow (`code = civic_default`) is
        protected and cannot be deleted; a workflow that is
        still referenced by reports cannot be deleted either
        — use the `active` flag via PUT to retire it.
      operationId: admin.workflows.destroy
      responses:
        '200':
          description: 'Workflow soft-deleted.'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deleted: { type: boolean, example: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: 'The default civic workflow is protected, or the workflow is still in use.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /api/v1/reports:
