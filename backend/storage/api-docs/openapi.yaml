        name: { type: string, example: 'Pothole' }
        code: { type: string, example: 'pothole' }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }
        color: { type: string, nullable: true }
        department_default_id: { type: string, format: uuid, nullable: true }
        requires_video: { type: boolean }
        requires_photo: { type: boolean }
        min_photos: { type: integer }
        max_photos: { type: integer }
        workflow_definition_id: { type: string, format: uuid, nullable: true }
        validation_rules: { type: object, nullable: true, additionalProperties: true }
        active: { type: boolean }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true }
    ReportTypeStoreRequest:
      type: object
      required: [name, code]
      properties:
        name: { type: string, maxLength: 255 }
        code: { type: string, maxLength: 64, pattern: '^[a-z0-9_]+$' }
        description: { type: string, nullable: true, maxLength: 1000 }
        icon: { type: string, nullable: true, maxLength: 64 }
        color: { type: string, nullable: true, maxLength: 16 }
        department_default_id: { type: string, format: uuid, nullable: true }
        requires_video: { type: boolean, nullable: true }
        requires_photo: { type: boolean, nullable: true }
        min_photos: { type: integer, nullable: true, minimum: 0, maximum: 99 }
        max_photos: { type: integer, nullable: true, minimum: 0, maximum: 99 }
        workflow_definition_id: { type: string, format: uuid, nullable: true }
        validation_rules: { type: object, nullable: true, additionalProperties: true }
        active: { type: boolean, nullable: true }
    ReportTypeUpdateRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        code: { type: string, maxLength: 64, pattern: '^[a-z0-9_]+$' }
        description: { type: string, nullable: true, maxLength: 1000 }
        icon: { type: string, nullable: true, maxLength: 64 }
        color: { type: string, nullable: true, maxLength: 16 }
        department_default_id: { type: string, format: uuid, nullable: true }
        requires_video: { type: boolean }
        requires_photo: { type: boolean }
        min_photos: { type: integer, minimum: 0, maximum: 99 }
        max_photos: { type: integer, minimum: 0, maximum: 99 }
        workflow_definition_id: { type: string, format: uuid, nullable: true }
        validation_rules: { type: object, nullable: true, additionalProperties: true }
        active: { type: boolean }
    DepartmentStoreRequest:
      type: object
      required: [name, code]
      properties:
        name: { type: string, maxLength: 255 }
        code: { type: string, maxLength: 32, description: 'Short uppercase code (e.g. BBMP).' }
        parent_id: { type: string, format: uuid, nullable: true }
        jurisdiction: { type: string, nullable: true, maxLength: 255 }
        address: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true, maxLength: 255 }
        phone: { type: string, nullable: true, maxLength: 32 }
        working_hours: { type: object, additionalProperties: true, nullable: true, description: 'Per-weekday open/close time. Example: {"mon": ["09:00","17:30"]}.' }
        holiday_calendar: { type: array, items: { type: string, format: date }, nullable: true }
        default_workflow_id: { type: string, format: uuid, nullable: true }
        default_sla_minutes: { type: integer, minimum: 1, maximum: 525600, nullable: true }
        escalation_matrix:
          type: array
          nullable: true
          items:
            type: object
            required: [after_minutes]
            properties:
              after_minutes: { type: integer, minimum: 1 }
              escalate_to: { type: string }
        active: { type: boolean, nullable: true }
    DepartmentUpdateRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        code: { type: string, maxLength: 32 }
        parent_id: { type: string, format: uuid, nullable: true }
        jurisdiction: { type: string, nullable: true, maxLength: 255 }
        address: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true, maxLength: 255 }
        phone: { type: string, nullable: true, maxLength: 32 }
        working_hours: { type: object, additionalProperties: true, nullable: true }
        holiday_calendar: { type: array, items: { type: string, format: date }, nullable: true }
        default_workflow_id: { type: string, format: uuid, nullable: true }
        default_sla_minutes: { type: integer, minimum: 1, maximum: 525600, nullable: true }
        escalation_matrix:
          type: array
          nullable: true
          items:
            type: object
            properties:
              after_minutes: { type: integer, minimum: 1 }
              escalate_to: { type: string }
        active: { type: boolean }
    Department:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        code: { type: string }
        parent_id: { type: string, format: uuid, nullable: true }
        jurisdiction: { type: string, nullable: true }
        address: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }
        working_hours: { type: object, additionalProperties: true, nullable: true }
        holiday_calendar: { type: array, items: { type: string, format: date }, nullable: true }
        default_workflow_id: { type: string, format: uuid, nullable: true }
        default_sla_minutes: { type: integer, nullable: true }
        escalation_matrix: { type: array, items: { type: object }, nullable: true }
        active: { type: boolean }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true }
    DepartmentResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Department' }
    DepartmentListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Department' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    SettingStoreRequest:
      type: object
      required: [key, value, type]
      properties:
        key: { type: string, maxLength: 255, description: 'Dotted-path identifier (e.g. ai.vision.provider).' }
        value: { description: 'JSON-decodable value. Strings, numbers, booleans, and arrays are accepted.' }
        type: { type: string, enum: [string, int, integer, bool, boolean, json, datetime] }
        description: { type: string, nullable: true, maxLength: 1000 }
        is_public: { type: boolean, nullable: true, description: 'When true, the setting is returned by /api/v1/master-config without authentication.' }
    SettingUpdateRequest:
      type: object
      properties:
        value: {}
        type: { type: string, enum: [string, int, integer, bool, boolean, json, datetime] }
        description: { type: string, nullable: true, maxLength: 1000 }
        is_public: { type: boolean }
    Setting:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        value: {}
        type: { type: string }
        description: { type: string, nullable: true }
        is_public: { type: boolean }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
        deleted_at: { type: string, format: date-time, nullable: true }
    SettingResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Setting' }
    SettingListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Setting' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    AppConfigStoreRequest:
      type: object
      required: [key]
      properties:
        key: { type: string, maxLength: 255 }
        value: { nullable: true, description: 'Optional JSON payload returned when the flag is on.' }
        enabled: { type: boolean, nullable: true, default: false }
        rollout_percentage: { type: integer, minimum: 0, maximum: 100, nullable: true, default: 0 }
        cohort:
          type: array
          nullable: true
          description: 'Predicate list. ANY match short-circuits the flag to true.'
          items:
            type: object
            additionalProperties: true
        description: { type: string, nullable: true, maxLength: 1000 }
    AppConfigUpdateRequest:
      type: object
      properties:
        value: { nullable: true }
        enabled: { type: boolean }
        rollout_percentage: { type: integer, minimum: 0, maximum: 100 }
        cohort:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
        description: { type: string, nullable: true, maxLength: 1000 }
    AppConfig:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        value: { nullable: true }
        enabled: { type: boolean }
        rollout_percentage: { type: integer }
        cohort:
          type: array
          nullable: true
          items: { type: object, additionalProperties: true }
        description: { type: string, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
    AppConfigResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/AppConfig' }
    AppConfigListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/AppConfig' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    AppConfigEvaluateResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required: [key, enabled]
              properties:
                key: { type: string }
                enabled: { type: boolean }
                user_id: { type: string, format: uuid, nullable: true }
                session_id: { type: string, nullable: true }
    PaginationMeta:
      type: object
      properties:
        total: { type: integer }
        per_page: { type: integer }
        current_page: { type: integer }
        last_page: { type: integer }
  responses:
    NotFound:
      description: 'Resource not found.'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: 'Authenticated but the role is not permitted.'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ValidationError:
      description: 'Request body failed validation.'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: 'Authentication required or invalid.'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: 'Resource state conflict (e.g. restoring a non-deleted row).'
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    RateLimited:
      description: 'Too many requests. Includes Retry-After header.'
      headers:
        Retry-After:
          description: 'Seconds to wait before retrying.'
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/admin/departments:
    get:
      tags: [Departments]
      summary: 'List departments (paginated)'
      operationId: admin.departments.index
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: jurisdiction
          schema: { type: string }
        - in: query
          name: parent_id
          schema: { type: string, format: uuid }
        - in: query
          name: active
          schema: { type: boolean }
        - in: query
          name: per_page
          schema: { type: integer, default: 25, maximum: 200 }
      responses:
        '200':
          description: 'Paginated list of departments.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
    post:
      tags: [Departments]
      summary: 'Create a department'
      operationId: admin.departments.store
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DepartmentStoreRequest' }
      responses:
        '201':
          description: 'Department created.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /api/v1/admin/departments/{department}:
    parameters:
      - in: path
        name: department
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Departments]
      summary: 'Show a department by id'
      operationId: admin.departments.show
      responses:
        '200':
          description: 'Department found.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [Departments]
      summary: 'Update a department (partial)'
      operationId: admin.departments.update
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DepartmentUpdateRequest' }
      responses:
        '200':
          description: 'Department updated.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepartmentResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Departments]
      summary: 'Soft-delete a department'
      operationId: admin.departments.destroy
      responses:
        '200':
          description: 'Department deleted.'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deleted: { type: boolean, example: true }
        '404': { $ref: '#/components/responses/NotFound' }
