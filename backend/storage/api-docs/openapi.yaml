        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  # =============================================================
  # T-M12-015 — Platform health
  # =============================================================
  /api/v1/admin/health:
    get:
      tags: [PlatformHealth]
      summary: 'Aggregate platform health (super_admin only)'
      operationId: admin.health.summary
      responses:
        '200':
          description: 'Platform health summary.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformHealthResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/admin/health/components:
    get:
      tags: [PlatformHealth]
      summary: 'Per-component platform health (super_admin only)'
      operationId: admin.health.components
      responses:
        '200':
          description: 'Per-component health snapshot.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformHealthComponentsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    sanctum:
      type: http
      description: 'Laravel Sanctum personal access token (M2).'
      bearerFormat: 'Sanctum PAT'
      scheme: bearer
  parameters:
    PathReportId:
      in: path
      name: report
      required: true
      schema: { type: string, format: uuid }
    PathDepartmentId:
      in: path
      name: department
      required: true
      schema: { type: string, format: uuid }
  schemas:
    ApiResponse:
      type: object
      description: 'Standard API envelope (docs/03 §20).'
      required: [success, message, data, code, trace_id]
      properties:
        success: { type: boolean }
        message: { type: string }
        data: { type: object, additionalProperties: true, nullable: true }
        errors: { type: object, additionalProperties: true, nullable: true }
        code: { type: string, description: 'Application-specific error code; null on success.' }
        trace_id: { type: string, description: 'Request id used for cross-service correlation.' }
        meta: { type: object, additionalProperties: true, nullable: true }
    PublicStatsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required: [total_reports, ai_classified_percent, median_assign_seconds]
              properties:
                total_reports: { type: integer, example: 12847 }
                ai_classified_percent: { type: number, format: float, example: 94.2 }
                median_assign_seconds: { type: integer, nullable: true, example: 38 }
    ErrorResponse:
      type: object
      required: [success, message, code, trace_id]
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: 'Invalid OTP code.' }
        code: { type: string, example: 'OTP_INVALID' }
        trace_id: { type: string, example: '0HMM8M3N5G2F1:00000001' }
        errors: { type: object, additionalProperties: true, nullable: true }
    SendOtpRequest:
      type: object
      required: [mobile]
      properties:
        mobile: { type: string, description: '10-digit local or E.164 form.', example: '9876543210' }
    SendOtpResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                otp_sent: { type: boolean, example: true }
    VerifyOtpRequest:
      type: object
      required: [mobile, code]
      properties:
        mobile: { type: string, example: '9876543210' }
        code: { type: string, description: '6-digit OTP delivered to the citizen.', example: '482913' }
    VerifyOtpResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required: [token, refresh_token, refresh_expires_at, user]
              properties:
                token:
                  type: object
                  required: [access_token, type, expires_at]
                  properties:
                    access_token: { type: string, description: 'Sanctum PAT. Use as `Authorization: Bearer <access_token>`.' }
                    type: { type: string, example: 'Bearer' }
                    expires_at: { type: string, format: date-time, nullable: true }
                refresh_token:
                  type: string
                  description: 'Opaque plaintext refresh token. Shown only once — store immediately.'
                refresh_expires_at: { type: string, format: date-time }
                user: { $ref: '#/components/schemas/User' }
    LoginRequest:
      type: object
      required: [mobile, password]
      properties:
        mobile: { type: string, example: '9876543210' }
        password: { type: string, description: 'Staff account password (docs/11 §8). Citizens have no password and always 401 here.' }
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string, minLength: 32, description: 'Opaque refresh token returned by /verify-otp or a previous /refresh.' }
    RefreshTokenResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required: [token, refresh_token, refresh_expires_at]
              properties:
                token:
                  type: object
                  required: [access_token, type, expires_at]
                  properties:
                    access_token: { type: string }
                    type: { type: string, example: 'Bearer' }
                    expires_at: { type: string, format: date-time, nullable: true }
                refresh_token: { type: string }
                refresh_expires_at: { type: string, format: date-time }
    LogoutResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                logged_out: { type: boolean, example: true }
    User:
      type: object
      description: 'UserResource payload (docs/05 §3). Roles, permissions, and safe department memberships are populated when their relations are eager-loaded.'
      properties:
        id: { type: string, format: uuid }
        name: { type: string, nullable: true }
        mobile: { type: string, example: '9876543210' }
        email: { type: string, format: email, nullable: true }
        anonymous_enabled: { type: boolean }
        status: { type: string, enum: [active, suspended, disabled, pending] }
        otp_verified_at: { type: string, format: date-time, nullable: true }
        last_login_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }
        roles:
          type: array
          items: { type: string, example: 'citizen' }
        permissions:
          type: array
          items: { type: string, example: 'reports.submit' }
        departments:
          type: array
          description: 'Department memberships used to scope staff portals. Never includes internal pivot identifiers.'
          items:
            type: object
            required: [id, code, name, is_manager]
            properties:
              id: { type: string, format: uuid }
              code: { type: string, example: 'BBMP-112' }
              name: { type: string, example: 'BBMP Ward 112' }
              is_manager: { type: boolean }
    UserResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/User' }
    UserListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/User' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    UserStoreRequest:
      type: object
      required: [mobile]
      properties:
        name: { type: string, maxLength: 255 }
        mobile: { type: string, maxLength: 32, description: 'E.164 mobile number; unique per user.' }
        email: { type: string, format: email, nullable: true, maxLength: 255 }
        password: { type: string, nullable: true, minLength: 8, maxLength: 128 }
        status:
          type: string
          nullable: true
          enum: ['active', 'suspended', 'banned', 'pending']
        anonymous_enabled: { type: boolean, nullable: true }
        roles:
          type: array
          nullable: true
          items: { type: string, description: 'Spatie role name.' }
    UserUpdateRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        mobile: { type: string, maxLength: 32 }
        email: { type: string, format: email, nullable: true, maxLength: 255 }
        password: { type: string, nullable: true, minLength: 8, maxLength: 128 }
        status:
          type: string
          nullable: true
          enum: ['active', 'suspended', 'banned', 'pending']
        anonymous_enabled: { type: boolean, nullable: true }
        roles:
          type: array
          nullable: true
          items: { type: string }
    RoleResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Role' }
    RoleListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Role' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    Role:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: 'moderator' }
        guard_name: { type: string, example: 'web' }
        protected: { type: boolean, example: false }
        permissions:
          type: array
          items: { type: string, example: 'reports.view' }
        created_at: { type: string, format: date-time, nullable: true }
    RoleStoreRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 64, example: 'analyst' }
        guard_name: { type: string, nullable: true, maxLength: 64, example: 'web' }
        permissions:
          type: array
          nullable: true
          items: { type: string, description: 'Spatie permission name to attach on create.' }
    RoleUpdateRequest:
      type: object
      properties:
        name: { type: string, maxLength: 64 }
        guard_name: { type: string, nullable: true, maxLength: 64 }
        permissions:
          type: array
          nullable: true
          items: { type: string }
    RolePermissionsSyncRequest:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items: { type: string, description: 'Full replacement list of permission names.' }
    PermissionResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Permission' }
    PermissionListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Permission' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    Permission:
      type: object
      properties:
        id: { type: integer, example: 12 }
        name: { type: string, example: 'reports.view' }
        guard_name: { type: string, example: 'web' }
        created_at: { type: string, format: date-time, nullable: true }
    SecurityPolicyResponse:
      allOf:
