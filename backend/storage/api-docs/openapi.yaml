  /api/v1/citizen/reports/{id}:
    get:
      tags: [Reports]
      summary: 'Citizen report detail (owner or staff)'
      operationId: reports.citizen.show
      security:
        - sanctum: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Report' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    Media:
      type: object
      description: 'A piece of evidence attached to a report (docs/04 §12).'
      required: [id, type, mime, size, created_at]
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [PHOTO, VIDEO, DOCUMENT] }
        mime: { type: string, example: 'image/jpeg' }
        size: { type: integer, description: 'Bytes.' }
        duration: { type: integer, nullable: true, description: 'Video duration in seconds (null for photo/document).' }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        checksum: { type: string, description: 'sha256 of the bytes; populated by ComputeHashesJob.' }
        captured_at: { type: string, format: date-time, nullable: true }
        uploaded_at: { type: string, format: date-time }
        uploaded_by: { type: string, format: uuid, nullable: true }
        version: { type: integer, description: 'Replacement counter; 1 on first upload.' }
        is_replaced: { type: boolean }
        storage_path: { type: string, description: 'Relative path on the storage disk. Only exposed to super_admin with include_storage_path=1.' }
        storage_disk: { type: string, description: 'Storage disk name. Only exposed to super_admin with include_storage_path=1.' }
        metadata:
          type: object
          nullable: true
          additionalProperties: true
    MediaWithSignedUrl:
      allOf:
        - $ref: '#/components/schemas/Media'
        - type: object
          properties:
            signed_url: { type: string, description: 'Time-limited URL for /api/v1/media/{id}/serve.' }
            signed_url_expires_at: { type: string, format: date-time }
    MediaHash:
      type: object
      description: 'Per-media hash row (docs/04 §12).'
      required: [media_id, sha256]
      properties:
        media_id: { type: string, format: uuid }
        sha256: { type: string, description: '64-char hex digest of the bytes.' }
        sha512: { type: string, nullable: true, description: '128-char hex digest.' }
        perceptual_hash: { type: string, nullable: true, description: '16-char hex pHash (GD fallback).' }
        video_fingerprint: { type: string, nullable: true, description: 'sha1 of the first 32 KiB (video only).' }
    MediaAccessLog:
      type: object
      description: 'Append-only chain-of-custody row (docs/11 §15).'
      required: [id, event, created_at]
      properties:
        id: { type: string, format: uuid }
        event: { type: string, enum: [VIEW, DOWNLOAD, REPLACE, DELETE, VIRUS_SCAN] }
        actor_id: { type: string, format: uuid, nullable: true }
        ip: { type: string, nullable: true }
        user_agent: { type: string, nullable: true }
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        created_at: { type: string, format: date-time }
    WorkflowState:
      type: object
      description: 'A node in a workflow graph (docs/04 section 11).'
      required: [id, code, name]
      properties:
        id: { type: string, format: uuid }
        code: { type: string, maxLength: 64, description: 'Natural key inside the parent definition (e.g. "draft", "submitted").' }
        name: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        is_initial: { type: boolean, description: 'Exactly one per definition; the entry state.' }
        is_terminal: { type: boolean, description: 'One or more per definition; no outgoing transitions.' }
        sort_order: { type: integer, minimum: 0 }
        color: { type: string, nullable: true, description: '7- or 9-char hex color for the timeline UI.' }
        active: { type: boolean }
    WorkflowTransition:
      type: object
      description: 'A directed edge in a workflow graph (docs/04 section 11).'
      required: [id, from_state_id, to_state_id, event, active]
      properties:
        id: { type: string, format: uuid }
        from_state_id: { type: string, format: uuid }
        to_state_id: { type: string, format: uuid }
        event: { type: string, maxLength: 64, description: 'The action that fires this transition (e.g. "submit", "assign", "reject").' }
        required_role: { type: string, nullable: true, maxLength: 64, description: 'Spatie role required on the actor; null means the engine accepts any actor (or null actor for system events).' }
        required_permission: { type: string, nullable: true, maxLength: 128 }
        conditions:
          type: object
          nullable: true
          additionalProperties: true
          description: 'JSON-Schema-fragment conditions the engine evaluates against (report.*, actor.*).'
        sla_minutes: { type: integer, nullable: true, minimum: 1, maximum: 525600, description: 'SLA in minutes; null means the transition has no SLA.' }
        notify_before_minutes: { type: integer, nullable: true, minimum: 0, maximum: 525600 }
        priority: { type: integer, minimum: 0, description: 'Higher priority wins on (from_state, event) ties.' }
        active: { type: boolean }
    Workflow:
      type: object
      description: 'A workflow definition with its full state + transition graph (M6).'
      required: [id, code, name, active, states, transitions]
      properties:
        id: { type: string, format: uuid }
        code: { type: string, maxLength: 64, description: 'Natural key. Snake-case lower-case letters, digits, underscores.' }
        name: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        active: { type: boolean }
        states:
          type: array
          items: { $ref: '#/components/schemas/WorkflowState' }
        transitions:
          type: array
          items: { $ref: '#/components/schemas/WorkflowTransition' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }
    WorkflowStoreRequest:
      type: object
      required: [code, name]
      properties:
        code: { type: string, maxLength: 64, pattern: '^[a-z0-9_]+$' }
        name: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        active: { type: boolean, default: true }
        states:
          type: array
          description: 'Optional initial states. Sent in full; the service replaces the current set.'
          items:
            type: object
            required: [code, name]
            properties:
              code: { type: string, maxLength: 64 }
              name: { type: string, maxLength: 255 }
              description: { type: string, nullable: true }
              is_initial: { type: boolean }
              is_terminal: { type: boolean }
              sort_order: { type: integer, minimum: 0 }
              color: { type: string, nullable: true, maxLength: 16 }
              active: { type: boolean }
        transitions:
          type: array
          description: 'Optional initial transitions. Reference states by their `code` value.'
          items:
            type: object
            required: [from_state, to_state, event]
            properties:
              from_state: { type: string, maxLength: 64 }
              to_state: { type: string, maxLength: 64 }
              event: { type: string, maxLength: 64 }
              required_role: { type: string, nullable: true, maxLength: 64 }
              required_permission: { type: string, nullable: true, maxLength: 128 }
              conditions:
                type: object
                nullable: true
                additionalProperties: true
              sla_minutes: { type: integer, nullable: true, minimum: 1, maximum: 525600 }
              notify_before_minutes: { type: integer, nullable: true, minimum: 0, maximum: 525600 }
              priority: { type: integer, minimum: 0 }
              active: { type: boolean }
    WorkflowUpdateRequest:
      type: object
      description: 'All fields optional. `states` and `transitions` blocks, when sent, REPLACE the current set in full.'
      properties:
        code: { type: string, maxLength: 64, pattern: '^[a-z0-9_]+$' }
        name: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        active: { type: boolean }
        states:
          type: array
          items:
            type: object
            required: [code, name]
            properties:
              code: { type: string, maxLength: 64 }
              name: { type: string, maxLength: 255 }
              description: { type: string, nullable: true }
              is_initial: { type: boolean }
              is_terminal: { type: boolean }
              sort_order: { type: integer, minimum: 0 }
              color: { type: string, nullable: true, maxLength: 16 }
              active: { type: boolean }
        transitions:
          type: array
          items:
            type: object
            required: [from_state, to_state, event]
            properties:
              from_state: { type: string, maxLength: 64 }
              to_state: { type: string, maxLength: 64 }
              event: { type: string, maxLength: 64 }
              required_role: { type: string, nullable: true, maxLength: 64 }
              required_permission: { type: string, nullable: true, maxLength: 128 }
              conditions:
                type: object
                nullable: true
                additionalProperties: true
              sla_minutes: { type: integer, nullable: true, minimum: 1, maximum: 525600 }
              notify_before_minutes: { type: integer, nullable: true, minimum: 0, maximum: 525600 }
              priority: { type: integer, minimum: 0 }
              active: { type: boolean }
    WorkflowResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Workflow' }
    WorkflowListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Workflow' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    RoutingRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: 'Pothole -> BBMP Ward 112' }
        description: { type: string, nullable: true }
        priority: { type: integer, example: 10, minimum: 0, maximum: 1000000 }
        conditions:
          $ref: '#/components/schemas/RoutingConditions'
        destination_department_id: { type: string, format: uuid }
        destination_department:
          type: object
          nullable: true
          properties:
            id: { type: string, format: uuid }
            code: { type: string }
            name: { type: string }
        default_officer_id: { type: string, format: uuid, nullable: true }
        default_priority_id: { type: string, format: uuid }
        default_priority:
          type: object
          nullable: true
          properties:
            id: { type: string, format: uuid }
            code: { type: string }
            name: { type: string }
        default_sla_minutes: { type: integer, minimum: 1, maximum: 525600 }
        active: { type: boolean }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
    RoutingConditions:
      type: object
      description: |
        The M7 RoutingCondition DSL. Each top-level key is an
        operator; multiple operators are AND-joined. A top-level
        `or` key holds a list of sub-conditions, any of which
        may match. An empty object matches every report.
      additionalProperties: true
      properties:
        category_in:
          type: array
          items: { type: string }
          description: 'Matches when the report type code is in the list.'
        ward_in:
          type: array
          items: { type: string, format: uuid }
          description: 'Matches when the location.ward_id is in the list.'
        district_in:
          type: array
          items: { type: string, format: uuid }
          description: 'Matches when the location.district_id is in the list.'
        severity_in:
          type: array
          items: { type: string }
          description: 'Matches when the priority code is in the list.'
        keyword_match:
          type: array
          items: { type: string }
          description: 'Case-insensitive substring match on title + description.'
        time_of_day_between:
          type: array
          minItems: 2
          maxItems: 2
          items: { type: string, example: '09:00' }
          description: '[start, end] HH:MM 24h; wraps midnight.'
        ai_label_in:
          type: array
          items: { type: string }
          description: 'Matches when the report ai_label column is in the list.'
        or:
          type: array
          items: { $ref: '#/components/schemas/RoutingConditions' }
      example:
        category_in: ['pothole', 'road_damage']
        or:
          - severity_in: ['high']
          - ward_in: ['9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d']
    RoutingRuleStoreRequest:
      type: object
      required: [name, destination_department_id, default_priority_id, default_sla_minutes]
      properties:
        name: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        priority: { type: integer, minimum: 0, maximum: 1000000, default: 100 }
        conditions: { $ref: '#/components/schemas/RoutingConditions' }
        destination_department_id: { type: string, format: uuid }
        default_officer_id: { type: string, format: uuid, nullable: true }
        default_priority_id: { type: string, format: uuid }
        default_sla_minutes: { type: integer, minimum: 1, maximum: 525600 }
        active: { type: boolean, default: true }
    RoutingRuleUpdateRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        priority: { type: integer, minimum: 0, maximum: 1000000 }
        conditions: { $ref: '#/components/schemas/RoutingConditions' }
        destination_department_id: { type: string, format: uuid }
        default_officer_id: { type: string, format: uuid, nullable: true }
        default_priority_id: { type: string, format: uuid }
        default_sla_minutes: { type: integer, minimum: 1, maximum: 525600 }
        active: { type: boolean }
    RoutingRuleReorderRequest:
      type: object
      required: [order]
      properties:
        order:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
          description: 'The desired final order, first = highest precedence.'
    ReassignReportRequest:
      type: object
      required: [department_id, reason]
      properties:
        department_id: { type: string, format: uuid }
        officer_id: { type: string, format: uuid, nullable: true }
        priority_id: { type: string, format: uuid, nullable: true }
        reason: { type: string, minLength: 3, maxLength: 500 }
    Reassignment:
      type: object
      properties:
        id: { type: string, format: uuid }
        report_id: { type: string, format: uuid }
        department_id: { type: string, format: uuid }
        officer_id: { type: string, format: uuid, nullable: true }
        assigned_by: { type: string, format: uuid, nullable: true }
        assigned_at: { type: string, format: date-time, nullable: true }
        reassignment_reason: { type: string, nullable: true }
    RoutingRuleResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/RoutingRule' }
    RoutingRuleListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/RoutingRule' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    ReassignResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Reassignment' }
  # =============================================================
  # M8 — AI Vision Pipeline
  # =============================================================
  /api/v1/admin/ai/providers:
    get:
      tags: [AI]
      summary: 'List AI provider configs (paginated, super_admin only)'
      operationId: admin.ai.providers.index
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: active
          schema: { type: boolean }
        - in: query
          name: per_page
          schema: { type: integer, default: 25, maximum: 200 }
      responses:
        '200':
          description: 'Paginated list of AI provider configs. credentials is masked; has_secret boolean is surfaced.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiProviderListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [AI]
      summary: 'Create an AI provider config'
      operationId: admin.ai.providers.store
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AiProviderStoreRequest' }
      responses:
        '201':
          description: 'AI provider config created.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiProviderResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/admin/ai/providers/{provider}:
    get:
      tags: [AI]
      summary: 'Show an AI provider config'
      operationId: admin.ai.providers.show
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 'AI provider config.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiProviderResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [AI]
      summary: 'Update an AI provider config'
      operationId: admin.ai.providers.update
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AiProviderUpdateRequest' }
      responses:
        '200':
          description: 'AI provider config updated.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiProviderResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [AI]
      summary: 'Delete an AI provider config'
      operationId: admin.ai.providers.destroy
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: 'AI provider config deleted.' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/admin/ai/prompts:
    get:
      tags: [AI]
      summary: 'List AI prompt versions (paginated, super_admin only)'
      operationId: admin.ai.prompts.index
      parameters:
        - in: query
          name: name
          schema: { type: string, description: 'Filter by prompt name (e.g. category_classifier).' }
        - in: query
          name: status
          schema: { type: string, enum: [draft, approved, deprecated] }
        - in: query
          name: per_page
          schema: { type: integer, default: 25, maximum: 200 }
      responses:
        '200':
          description: 'Paginated list of prompt versions.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromptVersionListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [AI]
      summary: 'Create a new prompt version'
      operationId: admin.ai.prompts.store
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromptVersionStoreRequest' }
      responses:
        '201':
          description: 'Prompt version created.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromptVersionResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/admin/ai/prompts/{prompt}:
    get:
      tags: [AI]
      summary: 'Show a prompt version'
      operationId: admin.ai.prompts.show
      parameters:
        - in: path
          name: prompt
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 'Prompt version.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromptVersionResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [AI]
      summary: 'Update a prompt version (only draft rows are editable)'
      operationId: admin.ai.prompts.update
      parameters:
        - in: path
          name: prompt
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromptVersionUpdateRequest' }
      responses:
        '200':
          description: 'Prompt version updated.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromptVersionResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [AI]
      summary: 'Delete a prompt version'
      operationId: admin.ai.prompts.destroy
      parameters:
        - in: path
          name: prompt
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: 'Prompt version deleted.' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/admin/ai/prompts/{prompt}/approve:
    post:
      tags: [AI]
      summary: 'Approve a new prompt version (deprecates the previous approved row for the same name)'
      operationId: admin.ai.prompts.approve
      parameters:
        - in: path
          name: prompt
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 'Prompt approved; the prior approved row for the same name is now deprecated.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromptVersionResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/admin/ai/prompts/{prompt}/rollback:
    post:
      tags: [AI]
      summary: 'Roll back to a deprecated prompt version (re-approves it; demotes the current approved row)'
      operationId: admin.ai.prompts.rollback
      parameters:
        - in: path
          name: prompt
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 'Rollback applied. The target row is now approved; the prior approved row is deprecated.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromptVersionResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /api/v1/internal/ai/process/{reportId}:
    post:
      tags: [AI]
      summary: 'Enqueue the AI pipeline for a report (system role only)'
      operationId: internal.ai.process
      parameters:
        - in: path
          name: reportId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202':
          description: 'Pipeline enqueued.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiProcessEnqueuedResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/internal/ai/job/{id}:
    get:
      tags: [AI]
      summary: 'Read an ai_jobs row by id (system role only)'
      operationId: internal.ai.job
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 'Job status.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiJobResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/internal/ai/job/{id}/result:
    get:
      tags: [AI]
      summary: 'Read the ai_results row + labels for a completed job (system role only)'
      operationId: internal.ai.job.result
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 'Result + labels.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiResultResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/notifications:
    get:
      tags: [Notifications]
      summary: "List the authenticated citizen's notifications (paginated, filterable)"
      operationId: notifications.index
      parameters:
        - in: query
          name: unread
          schema: { type: string, enum: ['0', '1', 'true', 'false'] }
        - in: query
          name: type
          schema: { type: string, example: 'report.assigned' }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: cursor
          schema: { type: string, nullable: true }
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/v1/notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: 'Mark a single notification as read (idempotent)'
      operationId: notifications.read
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationReadResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/notifications/preferences:
    get:
      tags: [Notifications]
      summary: "List the caller's per-(channel, event_code) opt-in flags"
      operationId: notifications.preferences.index
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferenceListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [Notifications]
      summary: 'Bulk-upsert notification preferences (channel + event_code + enabled)'
      operationId: notifications.preferences.update
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationPreferenceBulkUpdate' }
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferenceListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  # =============================================================
  # Notifications schemas
  # =============================================================
  Notification:
    type: object
    properties:
      id: { type: string, format: uuid }
      type: { type: string, example: 'report.assigned' }
      channel: { type: string, enum: [push, email, sms, webhook] }
      subject: { type: string }
      body: { type: string }
      status: { type: string, enum: [pending, sent, failed, dead] }
      read_at: { type: string, format: date-time, nullable: true }
      created_at: { type: string, format: date-time }
      metadata:
        type: object
        additionalProperties: true
  NotificationListResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: object
            properties:
              items:
                type: array
                items: { $ref: '#/components/schemas/Notification' }
              next_cursor: { type: string, nullable: true }
              unread_count: { type: integer }
  NotificationReadResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: object
            properties:
              id: { type: string, format: uuid }
              read_at: { type: string, format: date-time, nullable: true }
  NotificationPreference:
    type: object
    properties:
      channel: { type: string, enum: [push, email, sms, webhook] }
      event_code: { type: string, example: 'report.assigned' }
      enabled: { type: boolean }
  NotificationPreferenceBulkUpdate:
    type: object
    required: [preferences]
    properties:
      preferences:
        type: array
        minItems: 1
        items: { $ref: '#/components/schemas/NotificationPreference' }
  NotificationPreferenceListResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: object
            properties:
              preferences:
                type: array
                items: { $ref: '#/components/schemas/NotificationPreference' }

  # =============================================================
  # AI schemas
  # =============================================================
  AiProvider:
    type: object
    properties:
      id: { type: string, format: uuid }
      code: { type: string, example: 'mock' }
      driver: { type: string, enum: [mock, qwen_vl, openai_compatible], example: 'openai_compatible' }
      name: { type: string, example: 'Mock Provider' }
      base_url: { type: string, format: uri, nullable: true }
      auth_type: { type: string, enum: [none, bearer, api_key, oauth] }
      has_secret: { type: boolean, description: 'True when credentials.api_key is set; the credentials themselves are never returned.' }
      extra_headers: { type: object, additionalProperties: { type: string }, description: 'Static headers sent with every request (e.g. OpenRouter HTTP-Referer/X-Title).' }
      model: { type: string, example: 'mock-1.0' }
      temperature: { type: number, format: float, minimum: 0, maximum: 2 }
      timeout_ms: { type: integer, minimum: 1 }
      retry_count: { type: integer, minimum: 0 }
      priority: { type: integer, minimum: 0 }
      is_fallback: { type: boolean }
      active: { type: boolean }
      created_at: { type: string, format: date-time, nullable: true }
      updated_at: { type: string, format: date-time, nullable: true }
  AiProviderStoreRequest:
    type: object
    required: [code, driver, name, base_url, auth_type, model, temperature, timeout_ms, retry_count, priority, active, is_fallback]
    properties:
      code: { type: string, minLength: 1, maxLength: 64, example: 'mock' }
      driver: { type: string, enum: [mock, qwen_vl, openai_compatible], example: 'openai_compatible' }
      name: { type: string, minLength: 1, maxLength: 255 }
      base_url: { type: string, format: uri }
      auth_type: { type: string, enum: [none, bearer, api_key, oauth] }
      credentials: { type: object, nullable: true, properties: { api_key: { type: string, nullable: true } }, description: 'Write-only; never returned by any read endpoint.' }
      extra_headers: { type: object, nullable: true, additionalProperties: { type: string } }
      model: { type: string, minLength: 1, maxLength: 128 }
      temperature: { type: number, format: float, minimum: 0, maximum: 2 }
      timeout_ms: { type: integer, minimum: 1, maximum: 120000 }
      retry_count: { type: integer, minimum: 0, maximum: 10 }
      priority: { type: integer, minimum: 0, maximum: 1000 }
      is_fallback: { type: boolean }
      active: { type: boolean }
  AiProviderUpdateRequest:
    type: object
    properties:
      driver: { type: string, enum: [mock, qwen_vl, openai_compatible] }
      name: { type: string, minLength: 1, maxLength: 255 }
      base_url: { type: string, format: uri }
      auth_type: { type: string, enum: [none, bearer, api_key, oauth] }
      credentials: { type: object, nullable: true, properties: { api_key: { type: string, nullable: true } }, description: 'Write-only; never returned by any read endpoint.' }
      extra_headers: { type: object, nullable: true, additionalProperties: { type: string } }
      model: { type: string, minLength: 1, maxLength: 128 }
      temperature: { type: number, format: float, minimum: 0, maximum: 2 }
      timeout_ms: { type: integer, minimum: 1, maximum: 120000 }
      retry_count: { type: integer, minimum: 0, maximum: 10 }
      priority: { type: integer, minimum: 0, maximum: 1000 }
      is_fallback: { type: boolean }
      active: { type: boolean }
  AiProviderResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data: { $ref: '#/components/schemas/AiProvider' }
  AiProviderListResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: array
            items: { $ref: '#/components/schemas/AiProvider' }
          meta: { $ref: '#/components/schemas/PaginationMeta' }
  PromptVersion:
    type: object
    properties:
      id: { type: string, format: uuid }
      name: { type: string, example: 'category_classifier' }
      version: { type: integer, minimum: 1, example: 1 }
      purpose: { type: string, nullable: true }
      provider_code: { type: string, example: 'mock' }
      prompt_text: { type: string, description: 'The full prompt template sent to the provider.' }
      expected_json_schema: { type: string, nullable: true, description: 'JSON schema (as string) the provider response must validate against.' }
      status: { type: string, enum: [draft, approved, deprecated] }
      is_active: { type: boolean, description: 'True when this is the approved version for its name.' }
      created_at: { type: string, format: date-time, nullable: true }
      updated_at: { type: string, format: date-time, nullable: true }
  PromptVersionStoreRequest:
    type: object
    required: [name, version, provider_code, prompt_text, status]
    properties:
      name: { type: string, minLength: 1, maxLength: 128, example: 'category_classifier' }
      version: { type: integer, minimum: 1 }
      purpose: { type: string, nullable: true, maxLength: 255 }
      provider_code: { type: string, minLength: 1, maxLength: 64 }
      prompt_text: { type: string, minLength: 1 }
      expected_json_schema: { type: string, nullable: true }
      status: { type: string, enum: [draft, approved, deprecated] }
  PromptVersionUpdateRequest:
    type: object
    properties:
      purpose: { type: string, nullable: true, maxLength: 255 }
      provider_code: { type: string, minLength: 1, maxLength: 64 }
      prompt_text: { type: string, minLength: 1 }
      expected_json_schema: { type: string, nullable: true }
      status: { type: string, enum: [draft, approved, deprecated] }
  PromptVersionResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data: { $ref: '#/components/schemas/PromptVersion' }
  PromptVersionListResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: array
            items: { $ref: '#/components/schemas/PromptVersion' }
          meta: { $ref: '#/components/schemas/PaginationMeta' }
  AiJob:
    type: object
    properties:
      id: { type: string, format: uuid }
      report_id: { type: string, format: uuid }
      provider_code: { type: string, example: 'mock' }
      prompt_version_id: { type: string, format: uuid, nullable: true }
      status: { type: string, enum: [queued, running, succeeded, failed] }
      attempts: { type: integer, minimum: 0 }
      error: { type: string, nullable: true }
      started_at: { type: string, format: date-time, nullable: true }
      finished_at: { type: string, format: date-time, nullable: true }
  AiJobResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data: { $ref: '#/components/schemas/AiJob' }
  AiProcessEnqueuedResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: object
            properties:
              status: { type: string, example: 'queued' }
              job_id: { type: string, format: uuid }
              report_id: { type: string, format: uuid }
  AiLabel:
    type: object
    properties:
      id: { type: string, format: uuid }
      result_id: { type: string, format: uuid }
      label: { type: string, example: 'pothole' }
      confidence: { type: number, format: float, minimum: 0, maximum: 1 }
      is_primary: { type: boolean }
  AiResult:
    type: object
    properties:
      id: { type: string, format: uuid }
      job_id: { type: string, format: uuid }
      predicted_type: { type: string, example: 'pothole' }
      confidence: { type: number, format: float, minimum: 0, maximum: 1 }
      recommended_department: { type: string, nullable: true, example: 'public_works' }
      severity: { type: string, enum: [low, medium, high, critical] }
      quality_score: { type: integer, minimum: 0, maximum: 100 }
      duplicate_score: { type: integer, minimum: 0, maximum: 100 }
      fraud_score: { type: integer, minimum: 0, maximum: 100 }
      summary: { type: string }
      labels:
        type: array
        items: { $ref: '#/components/schemas/AiLabel' }
  AiResultResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data: { $ref: '#/components/schemas/AiResult' }
  # =============================================================
  # Moderation schemas (M10)
  # =============================================================
  ReportListItem:
    type: object
    properties:
      id: { type: string, format: uuid }
      tracking_number: { type: string }
      title: { type: string }
      category: { $ref: '#/components/schemas/Category' }
      department: { $ref: '#/components/schemas/Department' }
      status_code:
        type: string
        enum: [draft, submitted, ai_processing, pending_moderator, assigned, accepted, in_progress, resolved, verified, closed, rejected, merged, escalated]
      ai_confidence: { type: number, format: float, nullable: true }
      fraud_score: { type: number, format: float, nullable: true }
      duplicate_score: { type: number, format: float, nullable: true }
      submitted_at: { type: string, format: date-time }
      ward: { type: string, nullable: true }
      district: { type: string, nullable: true }
      evidence_count: { type: integer }
  ReportDetail:
    allOf:
      - $ref: '#/components/schemas/ReportListItem'
      - type: object
        properties:
          description: { type: string }
          citizen_id: { type: string, format: uuid }
          location:
            type: object
            nullable: true
            properties:
              lat: { type: number, format: float }
              lng: { type: number, format: float }
          media:
            type: array
            items: { $ref: '#/components/schemas/MediaItem' }
          ai_result:
            nullable: true
            allOf:
              - $ref: '#/components/schemas/AiResult'
          assigned_to:
            type: object
            nullable: true
            properties:
              id: { type: string, format: uuid }
              name: { type: string }
          audit_log:
            type: array
            items: { $ref: '#/components/schemas/AuditEntry' }
          status_history:
            type: array
            items: { $ref: '#/components/schemas/StatusHistoryEntry' }
  MediaItem:
    type: object
    properties:
      id: { type: string, format: uuid }
      mime_type: { type: string }
      url: { type: string, format: uri }
      width: { type: integer, nullable: true }
      height: { type: integer, nullable: true }
      duration_seconds: { type: number, nullable: true }
      captured_at: { type: string, format: date-time, nullable: true }
  AuditEntry:
    type: object
    properties:
      id: { type: string, format: uuid }
      actor_id: { type: string, format: uuid, nullable: true }
      actor_name: { type: string, nullable: true }
      action: { type: string }
      payload:
        type: object
        nullable: true
        additionalProperties: true
      created_at: { type: string, format: date-time }
  StatusHistoryEntry:
    type: object
    properties:
      from_code: { type: string, nullable: true }
      to_code: { type: string }
      actor_id: { type: string, format: uuid, nullable: true }
      reason: { type: string, nullable: true }
      created_at: { type: string, format: date-time }
  ReviewReportRequest:
    type: object
    required: [decision]
    properties:
      decision: { type: string, enum: [approve, reject, merge, escalate] }
      reason_code: { type: string }
      remarks: { type: string, maxLength: 2000 }
      category_id: { type: string, format: uuid }
      department_id: { type: string, format: uuid }
      override_ai: { type: boolean }
  BulkMergeRequest:
    type: object
    required: [canonical_id, duplicate_ids]
    properties:
      canonical_id: { type: string, format: uuid }
      duplicate_ids:
        type: array
        minItems: 1
        items: { type: string, format: uuid }
      reason_code: { type: string }
      remarks: { type: string, maxLength: 2000 }
  RejectRequest:
    type: object
    required: [reason_code]
    properties:
      reason_code: { type: string }
      remarks: { type: string, maxLength: 2000 }
  EscalateRequest:
    type: object
    required: [reason_code]
    properties:
      reason_code: { type: string }
      remarks: { type: string, maxLength: 2000 }
      level: { type: string }
  AnalyticsSummary:
    type: object
    properties:
      pending_moderator: { type: integer }
      duplicates_pending: { type: integer }
      fraud_pending: { type: integer }
      approved_today: { type: integer }
      rejected_today: { type: integer }
      merged_today: { type: integer }
      escalated_today: { type: integer }
      avg_review_minutes: { type: number, format: float }
      ai_accuracy_pct: { type: number, format: float }
  AiPerformance:
    type: object
    properties:
      window: { type: string, enum: [24h, 7d, 30d] }
      total_ai_decisions: { type: integer }
      overridden_by_moderator: { type: integer }
      override_rate_pct: { type: number, format: float }
      per_provider:
        type: array
        items:
          type: object
          properties:
            provider_code: { type: string }
            total: { type: integer }
            overridden: { type: integer }
            avg_confidence: { type: number, format: float }
  ReportQueueListResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data:
            type: array
            items: { $ref: '#/components/schemas/ReportListItem' }
          meta: { $ref: '#/components/schemas/PaginationMeta' }
  ReportDetailResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data: { $ref: '#/components/schemas/ReportDetail' }
  AnalyticsSummaryResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data: { $ref: '#/components/schemas/AnalyticsSummary' }
  AiPerformanceResponse:
    allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          data: { $ref: '#/components/schemas/AiPerformance' }

tags:
  -
    name: Health
    description: 'Liveness and readiness probes.'
  -
    name: Public
    description: 'Unauthenticated, privacy-safe aggregate stats (landing page, M17 Public Portal).'
  -
    name: Authentication
    description: 'Citizen OTP login, JWT issuance, refresh rotation, logout, current-user.'
  -
    name: Departments
    description: 'Super Admin CRUD for civic departments (BBMP, BTP, BWSSB, BESCOM, etc.).'
  -
    name: Settings
    description: 'Super Admin CRUD for global key/value settings (ai.vision.provider, mail.driver, ...).'
  -
    name: 'Feature Flags'
    description: 'Super Admin CRUD for app_configs (feature flags) and the deterministic evaluator.'
  -
    name: Workflows
    description: 'Super Admin CRUD for workflow definitions (M6) - state machine graphs, transitions, and SLA configuration.'
  -
    name: Reports
    description: 'Citizen report submission + read-back; staff report search, read, and timeline.'
  -
    name: 'Media'
    description: 'Photo / video / document evidence (M5). Upload, list, audit, and signed-URL playback. Chain-of-custody rows are written on every read.'
  -
    name: Routing
    description: 'Super Admin routing rules CRUD + manual report reassignment (M7).'
  -
    name: Notifications
    description: 'Citizen notification inbox + per-(channel, event) opt-in preferences (M9).'
  -
    name: AI
    description: 'AI vision pipeline: provider configs, prompt versions, internal pipeline endpoints (M8).'
  -
    name: Moderation
    description: 'Moderator portal: queue, duplicate + fraud review, manual override, reassign, analytics, AI performance (M10).'
  -
    name: Operations
    description: 'Department-officer portal: dashboard, list, lifecycle actions (accept/start/progress/resolve/close), internal notes, exports (M11).'
  -
    name: 'Department Admin'
    description: 'Super-admin department sub-resources: officer attach/detach, SLA, working hours, holiday calendar (M11).'
  -
    name: 'Super Admin'
    description: 'Super Admin user, role, and permission management (M12).'
