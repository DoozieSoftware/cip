name: Fix Production DB Credentials

on:
  workflow_dispatch:
    inputs:
      db_name:
        description: 'MySQL database name'
        required: true
      db_user:
        description: 'MySQL database user'
        required: true
      db_password:
        description: 'MySQL database password'
        required: true

jobs:
  fix:
    name: Restore DB Credentials & Reseed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore credentials and reseed
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          SSH_PORT="${{ secrets.DEPLOY_PORT }}"
          SSH_PORT="${SSH_PORT:-7822}"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          PHP_BIN="/opt/alt/php84/usr/bin/php"

          DB_NAME="${{ github.event.inputs.db_name }}"
          DB_USER="${{ github.event.inputs.db_user }}"
          DB_PASS="${{ github.event.inputs.db_password }}"

          echo "Step 1: Writing .env to remote..."
          cat > /tmp/fix_env.py << PYEOF
          import sys, os
          env_path = os.path.expanduser("~/cip/.env")
          with open(env_path) as f:
              lines = f.readlines()
          out = []
          for line in lines:
              k = line.split("=", 1)[0].strip() if "=" in line else ""
              if k == "DB_DATABASE":
                  out.append("DB_DATABASE=$DB_NAME\n")
              elif k == "DB_USERNAME":
                  out.append("DB_USERNAME=$DB_USER\n")
              elif k == "DB_PASSWORD":
                  out.append('DB_PASSWORD="$DB_PASS"\n')
              else:
                  out.append(line)
          with open(env_path, "w") as f:
              f.writelines(out)
          print("Done - .env updated")
          PYEOF

          scp -P $SSH_PORT -i /tmp/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
            /tmp/fix_env.py $REMOTE:~/cip/fix_env.py

          ssh -p $SSH_PORT -i /tmp/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
            $REMOTE "cd ~/cip && \
              cp .env .env.bak && \
              python3 fix_env.py && \
              echo '--- DB credentials in .env ---' && \
              grep '^DB_' .env && \
              echo '--- Testing DB connection ---' && \
              $PHP_BIN artisan config:clear 2>&1 && \
              $PHP_BIN artisan migrate:fresh --seed --force 2>&1 && \
              sleep 3 && \
              $PHP_BIN artisan config:cache 2>&1 && \
              $PHP_BIN artisan route:cache 2>&1 && \
              $PHP_BIN artisan event:cache 2>&1 && \
              echo 'Post-fix complete'"

          rm -f /tmp/deploy_key /tmp/fix_env.py

      - name: Verify fix
        run: |
          echo "Waiting 15s for cache to settle..."
          sleep 15
          curl -s -X POST https://cip-api.dgisipl.com/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"mobile":"9999900004","password":"demo1234"}' | python3 -m json.tool
