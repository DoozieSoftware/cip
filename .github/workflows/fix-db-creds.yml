name: Fix Production DB Credentials

on:
  workflow_dispatch:
    inputs:
      db_name:
        description: 'MySQL database name'
        required: true
      db_user:
        description: 'MySQL database user'
        required: true
      db_password:
        description: 'MySQL database password'
        required: true

jobs:
  fix:
    name: Restore DB Credentials & Reseed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore credentials and reseed
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          SSH_PORT="${{ secrets.DEPLOY_PORT }}"
          SSH_PORT="${SSH_PORT:-7822}"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          PHP_BIN="/opt/alt/php84/usr/bin/php"

          DB_NAME="${{ github.event.inputs.db_name }}"
          DB_USER="${{ github.event.inputs.db_user }}"
          DB_PASS="${{ github.event.inputs.db_password }}"

          echo "Restoring DB credentials on production..."
          ssh -p $SSH_PORT -i /tmp/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
            $REMOTE "cd ~/cip && \
              cp .env .env.bak; \
              while IFS='=' read -r key value; do \
                case \"\$key\" in \
                  DB_DATABASE) echo 'DB_DATABASE=$DB_NAME' >> /tmp/db_fix ;; \
                  DB_USERNAME) echo 'DB_USERNAME=$DB_USER' >> /tmp/db_fix ;; \
                  DB_PASSWORD) echo 'DB_PASSWORD=\"$DB_PASS\"' >> /tmp/db_fix ;; \
                esac; \
              done < .env.cpanel; \
              cp .env .env.bak; \
              while IFS='=' read -r key value; do \
                if [ \"\$key\" = 'DB_DATABASE' ]; then \
                  echo 'DB_DATABASE=$DB_NAME'; \
                elif [ \"\$key\" = 'DB_USERNAME' ]; then \
                  echo 'DB_USERNAME=$DB_USER'; \
                elif [ \"\$key\" = 'DB_PASSWORD' ]; then \
                  echo 'DB_PASSWORD=\"$DB_PASS\"'; \
                else \
                  echo \"\$key=\$value\"; \
                fi; \
              done < .env > .env.tmp && \
              cp .env.tmp .env && \
              echo 'DB credentials restored.' && \
              grep '^DB_' .env && \
              $PHP_BIN artisan config:clear 2>/dev/null && \
              $PHP_BIN artisan migrate:fresh --seed --force && \
              sleep 3 && \
              $PHP_BIN artisan config:cache && \
              $PHP_BIN artisan route:cache && \
              $PHP_BIN artisan event:cache && \
              echo 'Post-fix complete'"

          rm -f /tmp/deploy_key /tmp/db_fix

      - name: Verify fix
        run: |
          echo "Waiting 15s for cache to settle..."
          sleep 15
          curl -s -X POST https://cip-api.dgisipl.com/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"mobile":"9999900004","password":"demo1234"}' | python3 -m json.tool
